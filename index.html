  return{label:'OK',cls:'',e:'🟢'};
}
function sBadge(s){const m={'Da chiamare':'b-chiama','In attesa':'b-attesa','In trattativa':'b-tratt','Chiuso':'b-chiuso','Perso':'b-perso'};return`<span class="badge ${m[s]||'b-chiama'}">${s}</span>`;}
function tBadge(t){const m={'Acquirente':'b-acq','Venditore':'b-vend','Entrambi':'b-ent'};return`<span class="badge ${m[t]||'b-acq'}">${t}</span>`;}
function aIcon(t){const m={chiamata:'ti-phone',email:'ti-mail',whatsapp:'ti-brand-whatsapp',appuntamento:'ti-calendar',nota:'ti-notes'};return`<i class="ti ${m[t]||'ti-notes'}" aria-hidden="true"></i>`;}
function fmtDate(s){const d=new Date(s);return d.toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'})+' '+d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});}
function nowStr(){return new Date().toISOString().slice(0,10)+' '+new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});}

function showView(v){
  currentView=v;
  document.querySelectorAll('.nav').forEach(el=>el.classList.remove('active'));
  ['contatti','pipeline','statistiche','agenti','impostazioni'].forEach((n,i)=>{if(n===v)document.querySelectorAll('.nav')[i].classList.add('active');});
  document.getElementById('view-title').textContent={contatti:'Contatti',pipeline:'Pipeline attiva',statistiche:'Statistiche',agenti:'Per agente',impostazioni:'Impostazioni agenti'}[v];
  renderView();
}
function renderView(){
  const el=document.getElementById('main-content');
  if(currentView==='contatti')el.innerHTML=renderContatti();
  else if(currentView==='pipeline')el.innerHTML=renderPipeline();
  else if(currentView==='statistiche')el.innerHTML=renderStats();
  else if(currentView==='agenti')el.innerHTML=renderAgenti();
  else if(currentView==='impostazioni')el.innerHTML=renderSettings();
}

function buildRow(c){
  const p=getPrio(c);
  return`<tr class="${p.cls}">
    <td><span class="nome-link" onclick="openDetail(${c.id})">${c.nome}</span></td>
    <td style="color:#888;font-size:11px">${c.tel}</td>
    <td>${tBadge(c.tipo)}</td>
    <td style="color:var(--t2)">${c.zona}</td>
    <td style="color:var(--accent);font-weight:500">€${c.budget.toLocaleString('it-IT')}</td>
    <td>${sBadge(c.stato)}</td>
    <td style="font-size:11px">${p.e} ${p.label}</td>
    <td style="color:#666;font-size:11px">${c.agente}</td>
    <td>
      <div class="row-actions">
        <button class="act-btn act-btn-log" onclick="openDetail(${c.id})"><i class="ti ti-history" aria-hidden="true"></i> Log</button>
        <button class="act-btn act-btn-edit" onclick="openContactModal(${c.id})"><i class="ti ti-edit" aria-hidden="true"></i> Modifica</button>
        <button class="act-btn act-btn-del" onclick="deleteContact(${c.id})"><i class="ti ti-trash" aria-hidden="true"></i> Elimina</button>
      </div>
    </td>
  </tr>`;
}

function renderContatti(){
  const agOpts=['Tutti',...agents].map(a=>`<option>${a}</option>`).join('');
  let list=[...contacts.filter(c=>getPrio(c).label==='URGENTE'),...contacts.filter(c=>getPrio(c).label!=='URGENTE')];
  return`<div class="filters">
    <input class="fi search-fi" type="text" id="srch" placeholder="Cerca nome o zona..." oninput="applyFilters()">
    <select class="fi" id="fStato" onchange="applyFilters()"><option>Tutti</option><option>Da chiamare</option><option>In attesa</option><option>In trattativa</option><option>Chiuso</option><option>Perso</option></select>
    <select class="fi" id="fTipo" onchange="applyFilters()"><option>Tutti</option><option>Acquirente</option><option>Venditore</option><option>Entrambi</option></select>
    <select class="fi" id="fAgente" onchange="applyFilters()">${agOpts}</select>
  </div>
  <div class="tbl-wrap" style="overflow-x:auto"><table style="min-width:750px">
    <thead><tr>
      <th style="min-width:110px">Nome</th>
      <th style="min-width:100px">Telefono</th>
      <th style="min-width:75px">Tipo</th>
      <th style="min-width:65px">Zona</th>
      <th style="min-width:80px">Budget</th>
      <th style="min-width:85px">Stato</th>
      <th style="min-width:75px">Priorità</th>
      <th style="min-width:75px">Agente</th>
      <th style="min-width:230px">Azioni</th>
    </tr></thead>
    <tbody id="contacts-tbody">${list.map(buildRow).join('')}</tbody>
  </table></div>`;
}

function applyFilters(){
  const s=(document.getElementById('srch')||{value:''}).value.toLowerCase();
  const fS=(document.getElementById('fStato')||{value:'Tutti'}).value;
  const fT=(document.getElementById('fTipo')||{value:'Tutti'}).value;
  const fA=(document.getElementById('fAgente')||{value:'Tutti'}).value;
  let list=contacts.filter(c=>{
    if(s&&!c.nome.toLowerCase().includes(s)&&!c.zona.toLowerCase().includes(s))return false;
    if(fS!=='Tutti'&&c.stato!==fS)return false;
    if(fT!=='Tutti'&&c.tipo!==fT)return false;
    if(fA!=='Tutti'&&c.agente!==fA)return false;
    return true;
  });
  list=[...list.filter(c=>getPrio(c).label==='URGENTE'),...list.filter(c=>getPrio(c).label!=='URGENTE')];
  const tb=document.getElementById('contacts-tbody');
  if(tb)tb.innerHTML=list.map(buildRow).join('')||'<tr><td colspan="9" style="text-align:center;padding:30px;color:#555">Nessun contatto trovato</td></tr>';
}

function renderPipeline(){
  const list=contacts.filter(c=>c.stato==='In trattativa').sort((a,b)=>b.comm-a.comm);
  const tot=list.reduce((s,c)=>s+c.comm,0);
  const cards=list.map(c=>`<div class="pipe-card" onclick="openDetail(${c.id})">
    <div style="flex:1"><div style="font-weight:500;font-size:14px;color:var(--t0)">${c.nome}</div><div style="font-size:12px;color:var(--t2)">${c.tipo} · ${c.zona} · ${c.agente}</div></div>
    <div><div style="font-size:11px;color:#555;margin-bottom:2px">Commissione</div><div style="font-weight:500;font-size:15px;color:var(--accent)">€${c.comm.toLocaleString('it-IT')}</div></div>
    <div><div style="font-size:11px;color:#555;margin-bottom:2px">Budget</div><div style="font-size:13px;color:#ccc">€${c.budget.toLocaleString('it-IT')}</div></div>
    <div>${sBadge(c.stato)}</div>
    <i class="ti ti-chevron-right" style="color:#555;font-size:16px" aria-hidden="true"></i>
  </div>`).join('');
  return`<div class="pipe-total"><span style="font-size:13px;color:#AFA9EC;font-weight:500"><i class="ti ti-flame" aria-hidden="true"></i> Commissioni in pipeline</span><span style="font-size:22px;font-weight:500;color:#EEEDFE">€${tot.toLocaleString('it-IT')}</span></div>
  ${cards||'<div style="text-align:center;padding:40px;color:#555;font-size:13px">Nessuna trattativa attiva.</div>'}`;
}

function renderStats(){
  const tot=contacts.length,urg=contacts.filter(c=>getPrio(c).label==='URGENTE').length;
  const comm=contacts.filter(c=>c.stato==='In trattativa').reduce((s,c)=>s+c.comm,0);
  const stati={},agStat={};
  contacts.forEach(c=>{stati[c.stato]=(stati[c.stato]||0)+1;agStat[c.agente]=(agStat[c.agente]||0)+1;});
  const sRows=Object.entries(stati).map(([k,v])=>`<tr><td style="padding:9px 12px;color:#ccc">${k}</td><td style="padding:9px 12px;font-weight:500;color:#fff">${v}</td></tr>`).join('');
  const aRows=Object.entries(agStat).map(([k,v])=>`<tr><td style="padding:9px 12px;color:#ccc">${k}</td><td style="padding:9px 12px;font-weight:500;color:#fff">${v}</td></tr>`).join('');
  return`<div class="stats-grid">
    <div class="stat"><div class="lbl">Totale contatti</div><div class="val">${tot}</div></div>
    <div class="stat"><div class="lbl">Urgenti oggi</div><div class="val" style="color:#E24B4A">${urg}</div></div>
    <div class="stat"><div class="lbl">In trattativa</div><div class="val" style="color:#AFA9EC">${stati['In trattativa']||0}</div></div>
    <div class="stat"><div class="lbl">Pipeline €</div><div class="val" style="font-size:16px;color:var(--accent)">€${comm.toLocaleString('it-IT')}</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div class="tbl-wrap"><table><thead><tr><th style="padding:9px 12px">Stato</th><th style="padding:9px 12px">N.</th></tr></thead><tbody>${sRows}</tbody></table></div>
    <div class="tbl-wrap"><table><thead><tr><th style="padding:9px 12px">Agente</th><th style="padding:9px 12px">N.</th></tr></thead><tbody>${aRows}</tbody></table></div>
  </div>`;
}

function renderAgenti(){
  return`<div class="agents-grid">${agents.map(a=>{
    const list=contacts.filter(c=>c.agente===a);
    const init=a.split(' ').map(w=>w[0]).join('').slice(0,2);
    const rows=list.map(c=>`<div class="acr" onclick="openDetail(${c.id})"><span>${c.nome}</span><span>${getPrio(c).e}</span></div>`).join('');
    return`<div class="agent-card"><div class="agent-avatar">${init}</div><div style="font-weight:500;font-size:14px;color:var(--t0);margin-bottom:3px">${a}</div><div style="font-size:12px;color:var(--t2)">${list.length} contatt${list.length===1?'o':'i'}</div><div style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px">${rows||'<span style="color:#555;font-size:12px">Nessun contatto</span>'}</div></div>`;
  }).join('')}</div>`;
}

function renderSettings(){
  return`<div>
    <p style="font-size:13px;color:#888;margin-bottom:16px">Modifica i nomi degli agenti. Le modifiche si propagano su tutti i contatti assegnati.</p>
    <div>${agents.map((a,i)=>{
      const count=contacts.filter(c=>c.agente===a).length;
      const init=a.split(' ').map(w=>w[0]).join('').slice(0,2);
      return`<div class="setting-row"><div class="setting-av" id="sav-${i}">${init}</div><input type="text" value="${a}" id="sinput-${i}" onchange="renameAgent(${i},this.value)" onkeydown="if(event.key==='Enter')this.blur()"><span class="setting-count">${count} contatt${count===1?'o':'i'}</span></div>`;
    }).join('')}</div>
    <div style="margin-top:14px"><button class="btn-outline" onclick="addAgent()"><i class="ti ti-plus" aria-hidden="true"></i> Aggiungi agente</button></div>
  </div>`;
}

function renameAgent(i,n){
  const old=agents[i];agents[i]=n;
  contacts.forEach(c=>{if(c.agente===old)c.agente=n;});
  const av=document.getElementById(`sav-${i}`);
  if(av)av.textContent=n.split(' ').map(w=>w[0]).join('').slice(0,2);
}
function addAgent(){agents.push('Nuovo Agente');renderView();}

function openLogoModal(){
  pendingLogoUrl=null;
  document.getElementById('logo-preview-box').style.display='none';
  document.getElementById('btn-apply-logo').style.display='none';
  document.getElementById('btn-remove-logo').style.display=logoDataUrl?'':'none';
  document.getElementById('logo-file-input').value='';
  document.getElementById('logo-overlay').classList.add('open');
}
function closeLogoModal(){document.getElementById('logo-overlay').classList.remove('open');}
function handleLogoUpload(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    pendingLogoUrl=ev.target.result;
    document.getElementById('logo-preview-img').src=pendingLogoUrl;
    document.getElementById('logo-preview-box').style.display='block';
    document.getElementById('btn-apply-logo').style.display='';
  };
  reader.readAsDataURL(file);
}
function applyLogo(){
  if(!pendingLogoUrl)return;
  logoDataUrl=pendingLogoUrl;
  document.getElementById('logo-content').innerHTML=`<img class="logo-display" src="${logoDataUrl}" alt="Logo">`;
  document.getElementById('btn-remove-logo').style.display='';
  closeLogoModal();
}
function removeLogo(){
  logoDataUrl=null;
  document.getElementById('logo-content').innerHTML=`<div class="logo-placeholder"><i class="ti ti-photo" aria-hidden="true"></i> Carica logo</div>`;
  closeLogoModal();
}

function openContactModal(id){
  editingId=id||null;
  document.getElementById('f-agente').innerHTML=agents.map(a=>`<option>${a}</option>`).join('');
  document.getElementById('modal-title').textContent=id?'Modifica contatto':'Aggiungi contatto';
  document.getElementById('save-btn').textContent=id?'Salva modifiche':'Salva contatto';
  if(id){
    const c=contacts.find(x=>x.id===id);
    if(c){
      document.getElementById('f-nome').value=c.nome;document.getElementById('f-tel').value=c.tel;
      document.getElementById('f-email').value=c.email;document.getElementById('f-fonte').value=c.fonte;
      document.getElementById('f-tipo').value=c.tipo;document.getElementById('f-zona').value=c.zona;
      document.getElementById('f-budget').value=c.budget;document.getElementById('f-tempistiche').value=c.tempistiche;
      document.getElementById('f-stato').value=c.stato;document.getElementById('f-agente').value=c.agente;
      document.getElementById('f-azione').value=c.prossAzione;document.getElementById('f-data-azione').value=c.dataPross;
      document.getElementById('f-note').value='';
    }
  }else{
    ['f-nome','f-tel','f-email','f-zona','f-note'].forEach(fid=>document.getElementById(fid).value='');
    document.getElementById('f-budget').value='';document.getElementById('f-data-azione').value='';
  }
  document.getElementById('contact-overlay').classList.add('open');
}
function closeContactModal(){document.getElementById('contact-overlay').classList.remove('open');editingId=null;}
function saveContact(){
  const nome=document.getElementById('f-nome').value.trim();
  if(!nome){document.getElementById('f-nome').style.borderColor='#E24B4A';return;}
  const budget=parseInt(document.getElementById('f-budget').value)||0;
  const noteVal=document.getElementById('f-note').value.trim();
  if(editingId){
    const idx=contacts.findIndex(c=>c.id===editingId);
    const old=contacts[idx];
    contacts[idx]={...old,nome,tel:document.getElementById('f-tel').value,email:document.getElementById('f-email').value,
      fonte:document.getElementById('f-fonte').value,tipo:document.getElementById('f-tipo').value,
      zona:document.getElementById('f-zona').value,budget,comm:Math.round(budget*0.03),
      tempistiche:document.getElementById('f-tempistiche').value,stato:document.getElementById('f-stato').value,
      agente:document.getElementById('f-agente').value,prossAzione:document.getElementById('f-azione').value,
      dataPross:document.getElementById('f-data-azione').value};
    if(noteVal)contacts[idx].activities.push({id:Date.now(),type:'nota',text:noteVal,date:nowStr()});
  }else{
    const acts=noteVal?[{id:1,type:'nota',text:noteVal,date:nowStr()}]:[];
    contacts.push({id:Date.now(),nome,tel:document.getElementById('f-tel').value,email:document.getElementById('f-email').value,
      fonte:document.getElementById('f-fonte').value,tipo:document.getElementById('f-tipo').value,
      zona:document.getElementById('f-zona').value,budget,comm:Math.round(budget*0.03),
      tempistiche:document.getElementById('f-tempistiche').value,ultimoContatto:new Date().toISOString().slice(0,10),
      prossAzione:document.getElementById('f-azione').value,dataPross:document.getElementById('f-data-azione').value,
      stato:document.getElementById('f-stato').value,agente:document.getElementById('f-agente').value,activities:acts});
  }
  closeContactModal();renderView();
}
function deleteContact(id){
  if(confirm('Eliminare questo contatto?')){contacts=contacts.filter(c=>c.id!==id);renderView();}
}

function openDetail(id){detailId=id;selType='nota';renderDetailPanel();document.getElementById('detail-overlay').classList.add('open');}
function closeDetail(){document.getElementById('detail-overlay').classList.remove('open');detailId=null;applyFilters();}
function renderDetailPanel(){
  const c=contacts.find(x=>x.id===detailId);if(!c)return;
  const p=getPrio(c);
  const typeLabels={nota:'Nota',chiamata:'Chiamata',email:'Email',whatsapp:'WhatsApp',appuntamento:'Appuntamento'};
  const chips=['nota','chiamata','email','whatsapp','appuntamento'].map(t=>`<span class="chip${t===selType?' on':''}" onclick="selActType('${t}')">${typeLabels[t]}</span>`).join('');
  const sorted=[...c.activities].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const actItems=sorted.map((act,i)=>`<div class="act-item">
    <div class="act-dot-col"><div class="act-dot dot-${act.type}">${aIcon(act.type)}</div>${i<sorted.length-1?'<div class="act-line"></div>':''}</div>
    <div class="act-content"><span class="act-type-lbl">${typeLabels[act.type]||act.type}</span><span class="act-date-lbl">${fmtDate(act.date)}</span><div class="act-text">${act.text}</div></div>
  </div>`).join('');
  document.getElementById('detail-panel').innerHTML=`
    <div class="dp-header">
      <div>
        <div class="dp-name">${c.nome}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">${tBadge(c.tipo)} ${sBadge(c.stato)} <span style="font-size:11px;color:#555">${p.e} ${p.label}</span></div>
        <div style="display:flex;gap:14px;font-size:12px;color:#888">
          <span><i class="ti ti-phone" aria-hidden="true"></i> ${c.tel}</span>
          <span><i class="ti ti-map-pin" aria-hidden="true"></i> ${c.zona}</span>
          <span><i class="ti ti-user" aria-hidden="true"></i> ${c.agente}</span>
        </div>
      </div>
      <button class="btn-ghost" onclick="closeDetail()" aria-label="Chiudi"><i class="ti ti-x" aria-hidden="true"></i></button>
    </div>
    <div class="dp-body">
      <div class="dp-section">
        <div class="dp-stitle">Dettagli</div>
        <div class="dp-grid">
          <div class="dp-field"><label>Budget</label><span style="color:var(--accent)">€${c.budget.toLocaleString('it-IT')}</span></div>
          <div class="dp-field"><label>Commissione</label><span style="color:var(--accent)">€${c.comm.toLocaleString('it-IT')}</span></div>
          <div class="dp-field"><label>Fonte</label><span>${c.fonte}</span></div>
          <div class="dp-field"><label>Tempistiche</label><span>${c.tempistiche}</span></div>
          <div class="dp-field"><label>Prossima azione</label><span>${c.prossAzione}</span></div>
          <div class="dp-field"><label>Data azione</label><span>${c.dataPross||'—'}</span></div>
        </div>
      </div>
      <div class="act-area">
        <span class="act-lbl">Aggiungi attività</span>
        <div class="chips">${chips}</div>
        <textarea class="act-ta" id="act-text" placeholder="Descrivi l'attività svolta..."></textarea>
        <div style="display:flex;justify-content:flex-end;margin-top:8px"><button class="btn-accent" onclick="addActivity()"><i class="ti ti-check" aria-hidden="true"></i> Salva attività</button></div>
      </div>
      <div class="act-log">
        <div class="act-log-title">Cronologia — ${c.activities.length} attività</div>
        ${actItems||'<div style="text-align:center;padding:24px;color:#555;font-size:13px"><i class="ti ti-history" style="font-size:22px;display:block;margin-bottom:8px" aria-hidden="true"></i>Nessuna attività registrata.</div>'}
      </div>
    </div>`;
}
function selActType(t){
  selType=t;
  document.querySelectorAll('.chip').forEach(el=>el.classList.toggle('on',el.getAttribute('onclick').includes(`'${t}'`)));
}
function addActivity(){
  const ta=document.getElementById('act-text');
  const text=ta?ta.value.trim():'';
  if(!text){if(ta)ta.style.borderColor='#E24B4A';return;}
  const c=contacts.find(x=>x.id===detailId);if(!c)return;
  c.activities.push({id:Date.now(),type:selType,text,date:nowStr()});
  c.ultimoContatto=new Date().toISOString().slice(0,10);
  selType='nota';renderDetailPanel();
}

document.getElementById('contact-overlay').addEventListener('click',function(e){if(e.target===this)closeContactModal();});
document.getElementById('logo-overlay').addEventListener('click',function(e){if(e.target===this)closeLogoModal();});
document.getElementById('detail-overlay').addEventListener('click',function(e){if(e.target===this)closeDetail();});
renderView();
</script>
